<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Lima — Links</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Particles background */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 420px;
            width: 100%;
        }

        /* Glass card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Avatar */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 8px 32px rgba(108, 99, 255, 0.3);
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .tagline {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Link buttons */
        .links { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(108, 99, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.15);
        }

        .link-btn .icon {
            font-size: 22px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .link-btn .label {
            flex: 1;
            text-align: left;
        }

        .link-btn .arrow {
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .link-btn:hover .arrow {
            color: #6c63ff;
            transform: translateX(3px);
        }

        /* Icon backgrounds */
        .icon-site { background: rgba(108, 99, 255, 0.15); }
        .icon-whatsapp { background: rgba(37, 211, 102, 0.15); }
        .icon-blog { background: rgba(255, 193, 7, 0.15); }
        .icon-hotmart { background: rgba(233, 30, 99, 0.15); }
        .icon-telegram { background: rgba(0, 136, 204, 0.15); }
        .icon-instagram { background: rgba(225, 48, 108, 0.15); }

        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
        }

        .footer-text a {
            color: rgba(108, 99, 255, 0.5);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="container">
        <div class="card">
            <div class="avatar">AL</div>
            <h1>Anderson Lima</h1>
            <p class="tagline">Automação com IA &bull; Tráfego Digital</p>

            <div class="links">
                <a href="https://andersonlima7737-prog.github.io/anderson-site/" class="link-btn" target="_blank">
                    <span class="icon icon-site">🌐</span>
                    <span class="label">Site Profissional</span>
                    <span class="arrow">→</span>
                </a>

                <a href="https://wa.me/5511963621023?text=Ol%C3%A1%20Anderson%2C%20vi%20seus%20links%20e%20quero%20saber%20mais!" class="link-btn" target="_blank">
                    <span class="icon icon-whatsapp">💬</span>
                    <span class="label">Fale comigo no WhatsApp</span>
                    <span class="arrow">→</span>
                </a>

                <a href="https://automacaocomia.blogspot.com" class="link-btn" target="_blank">
                    <span class="icon icon-blog">📝</span>
                    <span class="label">Blog Automação com IA</span>
                    <span class="arrow">→</span>
                </a>

                <a href="https://andersonlima7737-prog.github.io/anderson-site/" class="link-btn" target="_blank">
                    <span class="icon icon-hotmart">📦</span>
                    <span class="label">FornecedorFinder PRO</span>
                    <span class="arrow">→</span>
                </a>

                <a href="https://t.me/+dS3r9Pzt-39iMWRh" class="link-btn" target="_blank">
                    <span class="icon icon-telegram">✈️</span>
                    <span class="label">Grupo Agentes Autônomos</span>
                    <span class="arrow">→</span>
                </a>

                <a href="#" class="link-btn" target="_blank">
                    <span class="icon icon-instagram">📸</span>
                    <span class="label">Instagram</span>
                    <span class="arrow">→</span>
                </a>
            </div>

            <p class="footer-text">Construído com IA · <a href="https://andersonlima7737-prog.github.io/anderson-site/">Anderson Lima</a></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(108, 99, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
